[manifest]
id = "custom_dawn_jingle"
display_name = "Custom Dawn/Night Jingle"
dependencies = [
    "mm_audio_api:1.0.0" # Match with the current Thunderstore/GitHub version
]

# Add a customizable slider to the mod menu
[[manifest.config_options]]
id = "jingle_volume"
name = "Jingle Volume"
description = "Adjust the volume of the dawn/night jingle."
type = "Float"
default = 1.0
min = 0.0
max = 3.0